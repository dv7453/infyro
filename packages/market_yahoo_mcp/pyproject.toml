[project]
name = "market-yahoo-mcp"
version = "0.1.0"
description = "Keyless Yahoo Finance MCP tools via yfinance"
requires-python = ">=3.11"
dependencies = [
  "mcp>=1.6.0",
  "yfinance>=0.2.40",
  "pydantic>=2.0",
]

[project.scripts]
market-yahoo-mcp = "market_yahoo_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["market_yahoo_mcp"]
