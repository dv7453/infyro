[project]
name = "infyro-db"
version = "0.1.0"
description = "Infyro SQLAlchemy models, Alembic migrations, and seed data"
requires-python = ">=3.11"
dependencies = [
  "sqlalchemy>=2.0.36",
  "psycopg[binary]>=3.2",
  "alembic>=1.14",
  "pydantic-settings>=2.6",
]

[project.scripts]
infyro-seed = "infyro_db.seed:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["infyro_db"]
