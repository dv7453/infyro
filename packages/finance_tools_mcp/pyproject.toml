[project]
name = "finance-tools-mcp"
version = "0.1.0"
description = "Internal MCP server — sole Postgres path for Hermes and OpenClaw"
requires-python = ">=3.11"
dependencies = [
  "infyro-db",
  "mcp>=1.6.0",
  "pydantic>=2.0",
]

[project.scripts]
finance-tools-mcp = "finance_tools_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["finance_tools_mcp"]
