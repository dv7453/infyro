# Infyro Hermes bridge config (reference for hermes CLI registration)
model:
  default: "llama-3.3-70b-versatile"
  provider: "auto"

mcp_servers:
  finance-tools:
    command: "uv"
    args: ["run", "--directory", "{{INFYRO_ROOT}}", "finance-tools-mcp"]
    tools:
      include:
        - get_watchlist
        - write_alert
        - get_agent_config
        - get_agent_for_chat
        - append_memory
        - get_conversation_log
        - append_conversation
        - upsert_otp
        - resolve_pairing_token
        - get_undelivered_alerts
        - mark_alert_delivered
        - list_agents_by_user
        - set_active_agent
        - get_catalog
  yahoo-finance:
    command: "uv"
    args: ["run", "--directory", "{{INFYRO_ROOT}}", "market-yahoo-mcp"]

# Telegram is owned by runtimes/hermes/runtime.py long-poller for Infyro.
# Point hermes gateway at the same bot only if TELEGRAM_INGRESS=hermes and
# the FastAPI poller/webhook is stopped.
